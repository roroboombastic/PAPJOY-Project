upstream papjoy_backend {
    server 127.0.0.1:5000;
}

server {
    listen 80;
    server_name papjoy.com www.papjoy.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name papjoy.com www.papjoy.com;

    root /var/www/papjoy;
    index index.html;

    ssl_certificate /etc/letsencrypt/live/papjoy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/papjoy.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers HIGH:!aNULL:!MD5;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer-when-downgrade always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://papjoy_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_read_timeout 90s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|json|png|jpg|jpeg|gif|svg|ico|webp|ttf|woff|woff2|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }
}
